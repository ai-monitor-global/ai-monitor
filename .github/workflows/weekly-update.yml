name: Weekly Data Update

on:
  schedule:
    # 周日 13:00 UTC = 北京时间 周日 21:00（和宏观周报同节奏）
    - cron: '0 13 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Update data + AI progress
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
        run: |
          python update_data.py || echo "update_data failed (continuing to progress)"
          python update_progress.py || echo "update_progress failed (continuing)"

      - name: Commit updated data.json
        run: |
          git config user.name  "ai-monitor-bot"
          git config user.email "bot@ai-monitor"
          git add data.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: weekly data update $(date -u +%Y-%m-%d)"
          git push
